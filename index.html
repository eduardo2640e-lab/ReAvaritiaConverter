<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RAEC Studio v0.3</title>

    <link rel="stylesheet" href="estilos.css">

</head>

<body>

<header class="topbar">

    <h1>⚡ RAEC Studio</h1>

    <span>Re:Avaritia → Extended Crafting Converter</span>

</header>

<div class="container">

    <aside class="sidebar">

        <button class="menuButton active">
            📦 Scanner
        </button>

        <button class="menuButton">
            ⭐ Singularidades
        </button>

        <button class="menuButton">
            📜 Receitas
        </button>

        <button class="menuButton">
            ⚙ Configurações
        </button>

        <button class="menuButton">
            🌎 Idioma
        </button>

        <button class="menuButton">
            📤 Exportar
        </button>

    </aside>

    <main class="content">

        <section class="card">

            <h2>📂 Selecionar Mod</h2>

            <button id="selectMod">
                Abrir Re:Avaritia.jar
            </button>

            <input
                id="fileInput"
                type="file"
                accept=".jar,.zip"
                hidden>

            <p id="arquivo">
                Nenhum arquivo selecionado
            </p>

        </section>

        <section class="card">

            <h2>🔍 Scanner</h2>

            <button
                id="converter"
                disabled>

                Escanear Mod

            </button>

        </section>

        <section class="card">

            <h2>📊 Status</h2>

            <div id="status">

                Aguardando seleção do arquivo...

            </div>

        </section>

        <section class="card">

            <h2>📜 Log</h2>

            <pre id="log">
RAEC Studio iniciado...
            </pre>

        </section>

    </main>

</div>

<footer>

RAEC Studio v0.3 Alpha

</footer>

<!-- Biblioteca para abrir arquivos .jar -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- Componentes -->
<script src="componentes/logger.js"></script>
<script src="componentes/jarReader.js"></script>
<script src="componentes/recipeParser.js"></script>
<script src="componentes/recipeScanner.js"></script>

<!-- Aplicação -->
<script src="app.js"></script>

</body>

</html>
